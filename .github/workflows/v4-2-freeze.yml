name: v4.2 freeze evidence

on:
  push:
    tags:
      - "v4.2-freeze-*"

permissions:
  contents: read

jobs:
  verify-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify frozen signed annotated tag
        env:
          FREEZE_TAG: ${{ github.ref_name }}
        run: |
          git fetch --force --no-tags origin "refs/tags/$FREEZE_TAG:refs/tags/$FREEZE_TAG"
          TAG_OID="$(git rev-parse "refs/tags/$FREEZE_TAG")"
          test "$(git cat-file -t "$TAG_OID")" = tag
          test "$(git rev-parse "$TAG_OID^{commit}")" = "$GITHUB_SHA"
          git config gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/pipeline/v4_2/allowed_signers"
          git verify-tag "$TAG_OID"
          ROOT_DIGEST="$(python -c 'import json; print(json.load(open("pipeline/v4_2/freeze_manifest.json"))["root_sha256"])')"
          git cat-file -p "$TAG_OID" | grep -F "$ROOT_DIGEST"

      - name: Verify deterministic complete v4.2 freeze
        run: |
          python -m unittest discover -s pipeline/build -p 'test_*.py'
          python pipeline/build/normalize_datasets_v4_2.py --check
          python pipeline/build/select_holdout_v4_2.py --check
          python pipeline/build/assemble_prompts.py --template-version 4.2 --scope canary --check --lint
          python pipeline/build/assemble_prompts.py --template-version 4.2 --scope holdout --check --lint
          python pipeline/build/freeze_contract_v4_2.py --check-plan
          python pipeline/build/freeze_v4_2.py --plan pipeline/v4_2/freeze_plan.json --output pipeline/v4_2/freeze_manifest.json --check

      - name: Upload externally timestamped freeze evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: v4.2-freeze-${{ github.sha }}
          if-no-files-found: error
          retention-days: 90
          path: |
            pipeline/v4_2/freeze_manifest.json
            pipeline/v4_2/freeze_plan.json
            pipeline/build/freeze_contract_v4_2.required.json
            pipeline/v4_2/holdout_membership.json
            pipeline/v4_2/regression_membership.json
            pipeline/v4_2/model_routes.json
            pipeline/v4_2/change_control.json
            pipeline/v4_2/allowed_signers
