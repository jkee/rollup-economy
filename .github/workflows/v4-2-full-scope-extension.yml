name: v4.2 full scope extension evidence

on:
  push:
    tags:
      - "v4.2-full-scope-*"

permissions:
  contents: read

jobs:
  verify-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14.4"

      - name: Verify signed C2 tag and exact full extension
        env:
          EXTENSION_TAG: ${{ github.ref_name }}
        run: |
          git fetch --force --no-tags origin "refs/tags/$EXTENSION_TAG:refs/tags/$EXTENSION_TAG"
          TAG_OID="$(git rev-parse "refs/tags/$EXTENSION_TAG")"
          test "$(git cat-file -t "$TAG_OID")" = tag
          test "$(git rev-parse "$TAG_OID^{commit}")" = "$GITHUB_SHA"
          git config gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/pipeline/v4_2/allowed_signers"
          git verify-tag "$TAG_OID"
          BASE_COMMIT="$(git cat-file -p "$TAG_OID" | sed -n 's/^base-commit //p')"
          EXTENSION_ROOT="$(python -c 'import json; print(json.load(open("pipeline/v4_2/full_scope_extension_manifest.json"))["root_sha256"])')"
          test -n "$BASE_COMMIT"
          git cat-file -p "$TAG_OID" | grep -F "extension-root $EXTENSION_ROOT"
          python pipeline/build/validate_full_scope_extension_v4_2.py --base-commit "$BASE_COMMIT"

      - name: Upload externally timestamped C2 evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: v4.2-full-scope-${{ github.sha }}
          if-no-files-found: error
          retention-days: 90
          path: pipeline/v4_2/full_scope_extension_manifest.json
